<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ずぼら価格一発比較ツール</title>
    
    <!-- PWA設定（ホーム画面追加用） -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ずぼら比較">
    
    <style>
        :root {
            --primary-color: #e50914; /* パッと目を引く比較ボタン用 */
            --accent-color: #ffb423; /* 星やハイライト用 */
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #888888;
            --shop-safe: #2e6930;
            --shop-unknown: #444444;
            --link-color: #00a8ff; /* リンクボタン用の青 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: var(--card-bg);
            padding: 20px 15px 15px 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            border-bottom: 1px solid #2d2d2d;
        }

        .container { padding: 15px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h2 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--accent-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 8px;
            margin-bottom: 12px;
        }

        .page { display: none; }
        .page.active { display: block !important; }

        input, textarea, button, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
        }

        /* モード切り替え用 */
        .mode-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }
        .mode-btn {
            flex: 1;
            background-color: #252525;
            color: var(--text-muted);
            border: 1px solid #333;
            padding: 12px 5px;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .mode-btn.active {
            background-color: #2a2a2a;
            color: var(--accent-color);
            border-color: var(--accent-color);
            font-weight: bold;
        }

        button.btn-main {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(229, 9, 20, 0.4);
        }
        button.btn-main:active { opacity: 0.8; }

        button.btn-sub {
            background-color: #444;
            color: #fff;
            border: none;
            font-size: 0.85rem;
            padding: 8px 12px;
            width: auto;
            margin: 4px;
            border-radius: 6px;
        }

        /* リンクボタン用スタイル */
        .btn-link {
            background-color: var(--link-color) !important;
            color: #fff !important;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
        }

        /* 結果表示のデザイン */
        .result-item {
            background: #161616;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid var(--shop-safe);
        }
        .result-item.alert-shop {
            border-left-color: #b83b5e;
        }
        .shop-tag {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .tag-regular { background: #2e6930; color: #fff; }
        .tag-unknown { background: #b83b5e; color: #fff; }

        .price-large {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
        }
        .shipping-text {
            font-size: 0.85rem;
            color: #ff7675;
            margin-left: 10px;
        }
        .points-text {
            font-size: 0.85rem;
            color: #eccc68;
            margin-top: 4px;
        }

        /* 画像プレビュー */
        #img-preview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            margin-top: 8px;
            display: none;
        }

        /* ナビゲーションバー */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #2d2d2d;
            z-index: 9999;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-decoration: none;
            cursor: pointer;
        }
        .nav-item.active {
            color: var(--accent-color);
            font-weight: bold;
        }
        .nav-icon {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 2px;
        }

        .list-box {
            background: #161616;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2d2d2d;
        }
    </style>
</head>
<body>

    <header>🔍 あっきーのずぼら価格一発比較</header>

    <div class="container">
        
        <!-- 🏠 メイン比較画面 -->
        <div id="page-search" class="page active">
            
            <!-- 🔍 検索モード選択 -->
            <div class="mode-selector">
                <div id="m-easy" class="mode-btn active" onclick="setSearchMode('easy')">🐢 ふんわり商品名<br>(探す・迷い中用)</div>
                <div id="m-strict" class="mode-btn" onclick="setSearchMode('strict')">🎯 型番でカッチリ<br>(最安値指名買い)</div>
            </div>

            <!-- 📝 入力エリア -->
            <div class="card">
                <h2>🛒 何をくらべる？</h2>
                <input type="text" id="search-input" placeholder="例: Staub ココット 26cm チェリーレッド">
                
                <div style="margin-top: 12px; border-top: 1px dashed #333; padding-top: 10px;">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">📸 画像やスクショから商品特定 (Geminiの目)</span>
                    <input type="file" id="image-file" accept="image/*" onchange="previewImage(this)">
                    <img id="img-preview" alt="プレビュー">
                </div>

                <div style="margin-top: 12px; border-top: 1px dashed #333; padding-top: 10px;">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">🏪 近所のチラシ・実店舗 of 対抗価格 (あれば)</span>
                    <input type="text" id="local-shop-input" placeholder="例: 近所のドンキで 3,980円だった">
                </div>
            </div>

            <button class="btn-main" onclick="startComparison();">最安値を一発比較する 🚀</button>

            <!-- 📊 比較結果表示 -->
            <div class="card" id="result-card" style="display:none; margin-top: 20px;">
                <h2>🏆 比較結果 (実質表記は完全禁止)</h2>
                <div id="result-summary" style="font-size: 1rem; font-weight: bold; color: var(--accent-color); margin-bottom: 15px; padding: 10px; background: #252525; border-radius: 6px;"></div>
                <div id="result-list"></div>
            </div>
        </div>

        <!-- 🛡️ 設定・ショップ管理画面 -->
        <div id="page-settings" class="page">
            <div class="card">
                <h2>🔑 AIの鍵設定（家計簿・英語共通）</h2>
                <input type="password" id="app-api-key" placeholder="AQ.Ab8... で始まるキーを貼り付け" onchange="saveKey();">
                <p style="font-size:0.75rem; color:#4e8d7c; margin: 5px 0 0 0; display:none;" id="key-status-msg">✅ 鍵を記憶しました！</p>
            </div>

            <div class="card">
                <h2>❌ 除外ショップ（ブラックリスト）</h2>
                <p style="font-size:0.8rem; color:var(--text-muted); margin-top:0;">ここに登録されたショップは、検索結果から完全に締め出されます。</p>
                <div class="list-box" id="blacklist-container"></div>
                <div style="display:flex; gap:6px; margin-top:8px;">
                    <input type="text" id="new-blacklist-shop" placeholder="ショップ名を手動追加" style="margin:0;">
                    <button class="btn-sub" style="margin:0;" onclick="addBlacklistHandy();">追加</button>
                </div>
            </div>

            <div class="card">
                <h2>📌 お気に入りショップ（レギュラー固定）</h2>
                <p style="font-size:0.8rem; color:var(--text-muted); margin-top:0;">いつも使う基本の安心ショップ一覧です。</p>
                <div class="list-box" id="whitelist-container"></div>
            </div>
        </div>

    </div>

    <!-- ナビバー -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('search', this);"><span class="nav-icon">🔍</span>一発比較</div>
        <div class="nav-item" onclick="switchTab('settings', this);"><span class="nav-icon">⚙️</span>ショップ管理</div>
    </div>

    <script>
        let currentMode = 'easy'; // 'easy' or 'strict'
        let base64Image = null;

        let whitelist = JSON.parse(localStorage.getItem('akky_shop_whitelist')) || ["Amazon", "楽天市場", "ヨドバシカメラ", "AliExpress", "Temu", "ZOZOTOWN", "TikTok Liteショップ"];
        let blacklist = JSON.parse(localStorage.getItem('akky_shop_blacklist')) || [];

        document.addEventListener("DOMContentLoaded", () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if(savedKey) {
                document.getElementById('app-api-key').value = savedKey;
                document.getElementById('key-status-msg').style.display = 'block';
            }
            renderShopLists();
        });

        function saveKey() {
            const key = document.getElementById('app-api-key').value.trim();
            if(key) {
                localStorage.setItem('gemini_api_key', key);
                document.getElementById('key-status-msg').style.display = 'block';
            } else {
                localStorage.removeItem('gemini_api_key');
                document.getElementById('key-status-msg').style.display = 'none';
            }
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + tabId).classList.add('active');
            if(element) element.classList.add('active');
        }

        function setSearchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('m-' + mode).classList.add('active');
            
            const inputEl = document.getElementById('search-input');
            if(mode === 'strict') {
                inputEl.placeholder = "例: Staub 40509-307 (型番やJANコード)";
            } else {
                inputEl.placeholder = "例: Staub ココット 26cm チェリーレッド";
            }
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = document.getElementById('img-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    base64Image = e.target.result.split(',')[1];
                }
                reader.readAsDataURL(file);
            }
        }

        function renderShopLists() {
            const blContainer = document.getElementById('blacklist-container');
            if(blacklist.length === 0) {
                blContainer.innerHTML = `<span style="color:var(--text-muted); font-size:0.8rem;">除外中のショップはありません。</span>`;
            } else {
                blContainer.innerHTML = blacklist.map((shop, i) => `
                    <div class="list-item">
                        <span>❌ ${shop}</span>
                        <button class="btn-sub" style="background:#8b0000; padding:4px 8px; margin:0;" onclick="removeBlacklist(${i})">解除</button>
                    </div>
                `).join('');
            }

            const wlContainer = document.getElementById('whitelist-container');
            wlContainer.innerHTML = whitelist.map(shop => `
                <div class="list-item">
                    <span>📌 ${shop}</span>
                    <span style="font-size:0.75rem; color:var(--text-muted);">レギュラー</span>
                </div>
            `).join('');
        }

        function addBlacklistHandy() {
            const input = document.getElementById('new-blacklist-shop');
            const name = input.value.trim();
            if(name && !blacklist.includes(name)) {
                blacklist.push(name);
                localStorage.setItem('akky_shop_blacklist', JSON.stringify(blacklist));
                renderShopLists();
                input.value = "";
            }
        }

        function removeBlacklist(index) {
            blacklist.splice(index, 1);
            localStorage.setItem('akky_shop_blacklist', JSON.stringify(blacklist));
            renderShopLists();
        }

        function addBlacklistFromServer(shopName) {
            if(!blacklist.includes(shopName)) {
                blacklist.push(shopName);
                localStorage.setItem('akky_shop_blacklist', JSON.stringify(blacklist));
                renderShopLists();
                alert(`「${shopName}」を今後の検索結果から除外しました。`);
                startComparison();
            }
        }

        function addWhitelistFromServer(shopName) {
            if(!whitelist.includes(shopName)) {
                whitelist.push(shopName);
                localStorage.setItem('akky_shop_whitelist', JSON.stringify(whitelist));
                renderShopLists();
                alert(`「${shopName}」をお気に入りのレギュラーショップに登録しました！`);
                startComparison();
            }
        }

        // 🆕 1タップでクリップボードにコピーする関数
        function copyKeyword() {
            const word = document.getElementById('target-word').innerText;
            navigator.clipboard.writeText(word).then(() => {
                alert("検索ワードをコピーしました！ショップで貼り付けてね 📋");
            }).catch(err => {
                alert("コピーに失敗しました、手動で選択してください 😢");
            });
        }

        async function startComparison() {
            const apiKey = localStorage.getItem('gemini_api_key');
            if(!apiKey) return alert("⚙️設定タブからAPIキーを設定してください。");

            const textQuery = document.getElementById('search-input').value.trim();
            const localPrice = document.getElementById('local-shop-input').value.trim();

            if(!textQuery && !base64Image) {
                return alert("商品名を入力するか、画像をアップロードしてください！");
            }

            const resultCard = document.getElementById('result-card');
            const resultSummary = document.getElementById('result-summary');
            const resultList = document.getElementById('result-list');

            resultCard.style.display = "block";
            resultSummary.innerText = "⏳ ネットの海から最安値を一発検索中...";
            resultList.innerHTML = "";

            let prompt = `You are a professional price comparison assistant for Akky.\n`;
            prompt += `[Search Mode]: ${currentMode === 'easy' ? 'Casual search (find target and analyze market prices)' : 'Strict comparison (exact model/JAN number check for the lowest price)'}\n`;
            prompt += `[User's Safe Regular Shops (Whitelist)]: ${whitelist.join(', ')}\n`;
            prompt += `[BANNED Shops (Blacklist)]: ${blacklist.join(', ')} -> NEVER include these stores in the results.\n`;
            
            if(textQuery) prompt += `[Target Product/Keyword]: ${textQuery}\n`;
            if(localPrice) prompt += `[User's Local/Chirar Price Input]: ${localPrice} (Compare this with online prices and give a clear verdict on which is cheaper)\n`;
            
            prompt += `\nCRITICAL PRICE RULES:\n`;
            prompt += `1. NEVER use "Effective Price" (実質価格) after point subtractions. Point calculations must be separated!\n`;
            prompt += `2. You MUST separate the Base Product Price (本体価格) and Shipping Fee (送料). Display them clearly.\n`;
            prompt += `3. If you find unknown shops outside the whitelist, tag them as unknown so Akky can decide.\n`;
            
            // 🆕 最適な「検索テキスト」自体をJSONの中に抽出させる指示を追加
            prompt += `4. Extract the single best/cleanest Japanese product text or model name used for your internal market search and provide it as "searched_keyword".\n`;
            prompt += `5. For each shop, generate a direct search results URL for this product on that specific store. Make sure the search query in the URL is properly URL-encoded (e.g., spaces converted to %20 or +, Japanese text encoded correctly).\n`;
            
            prompt += `\nOutput MUST be raw JSON format only (No markdown code blocks, just pure JSON object):\n`;
            prompt += `{\n`;
            prompt += `  "verdict": "A brief conclusion in Japanese (e.g., 'ネットのAmazonが送料込みでも一番安いです！')",\n`;
            prompt += `  "searched_keyword": "Geminiが特定・使用した、コピペに最適な綺麗な商品名・型番キーワード（日本語OK）",\n`;
            prompt += `  "shops": [\n`;
            prompt += `    {\n`;
            prompt += `      "name": "Shop Name",\n`;
            prompt += `      "is_regular": true/false,\n`;
            prompt += `      "base_price": "本体価格(数字のみ or 税込表記)",\n`;
            prompt += `      "shipping": "送料情報(無料、または〇〇円)",\n`;
            prompt += `      "points": "ポイント情報(〇〇pt還元など)",\n`;
            prompt += `      "direct_search_url": "The direct URL-encoded search results page URL for this item on this store"\n`;
            prompt += `    }\n`;
            prompt += `  ]\n`;
            prompt += `}`;

            let payloadContents = [];
            let partsArray = [{ text: prompt }];

            if (base64Image) {
                partsArray.push({
                    inline_data: {
                        mime_type: "image/jpeg",
                        data: base64Image
                    }
                });
                partsArray.push({ text: "Analyze this image/screenshot to identify the product model/name and include it in the price comparison." });
            }

            payloadContents.push({ role: "user", parts: partsArray });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: payloadContents })
                });

                const data = await response.json();
                let rawText = data.candidates[0].content.parts[0].text;
                
                rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                const result = JSON.parse(rawText);

                // 🆕 結論と一緒に、1タップでコピーできる「参考検索ワード」を表示させるUIにリフォーム
                const detectedWord = result.searched_keyword || textQuery || "商品最安値";
                resultSummary.innerHTML = `
                    📢 ズバッと結論：<br><span style="color:#fff; font-weight:normal;">${result.verdict}</span>
                    <div style="margin-top: 12px; padding: 10px; background: #161616; border-radius: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333;">
                        <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px;">
                            📋 <span style="color:var(--text-muted);">参考ワード:</span> <strong id="target-word" style="color:var(--accent-color);">${detectedWord}</strong>
                        </div>
                        <button onclick="copyKeyword()" style="width:auto; margin:0; padding:6px 12px; font-size:0.75rem; background:#444; border:none; border-radius:6px; color:#fff; font-weight:bold; cursor:pointer; flex-shrink:0;">コピー</button>
                    </div>
                `;

                if(result.shops && result.shops.length > 0) {
                    resultList.innerHTML = result.shops.map(shop => {
                        if(blacklist.includes(shop.name)) return '';

                        const isRegular = whitelist.includes(shop.name) || shop.is_regular;
                        const tagClass = isRegular ? 'tag-regular' : 'tag-unknown';
                        const tagLabel = isRegular ? '📌 いつものショップ' : '⚠️ 初見・要確認';
                        const itemClass = isRegular ? '' : 'alert-shop';

                        const shopUrl = shop.direct_search_url || `https://www.google.com/search?q=${encodeURIComponent(detectedWord)}`;

                        let actionButtons = '';
                        if (!isRegular) {
                            actionButtons = `
                                <div style="margin-top:8px; text-align:right;">
                                    <button class="btn-sub" style="background:#2e6930; font-size:0.75rem;" onclick="addWhitelistFromServer('${shop.name}')">📌 レギュラーに追加</button>
                                    <button class="btn-sub" style="background:#8b0000; font-size:0.75rem;" onclick="addBlacklistFromServer('${shop.name}')">❌ 今後除外する</button>
                                </div>
                            `;
                        } else {
                            actionButtons = `
                                <div style="margin-top:8px; text-align:right;">
                                    <button class="btn-sub" style="background:#8b0000; font-size:0.75rem;" onclick="addBlacklistFromServer('${shop.name}')">❌ このショップを除外</button>
                                </div>
                            `;
                        }

                        return `
                            <div class="result-item ${itemClass}">
                                <span class="shop-tag ${tagClass}">${tagLabel} : ${shop.name}</span>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div>
                                        <span class="price-large">${shop.base_price}</span>
                                        <span class="shipping-text">📦 送料: ${shop.shipping}</span>
                                    </div>
                                    <div>
                                        <a href="${shopUrl}" target="_blank" rel="noopener noreferrer" class="btn-link">ショップを開く 🔗</a>
                                    </div>
                                </div>
                                <div class="points-text">🪙 特典: ${shop.points || '情報なし'}</div>
                                ${actionButtons}
                            </div>
                        `;
                    }).join('');
                } else {
                    resultList.innerHTML = `<p style="color:var(--text-muted); text-align:center;">該当するショップ情報が見つかりませんでした。</p>`;
                }

            } catch (error) {
                resultSummary.innerText = "❌ 比較エラーが発生しました。";
                resultList.innerHTML = `<p style="color:var(--text-muted); font-size:0.85rem;">APIキーが正しいか、または入力内容を少し変えてもう一度お試しください。</p>`;
            }
        }
    </script>
</body>
</html>
